name: E2E Smoke (nightly)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Write service-account.json from secret
        env:
          SA_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "${SA_B64:-}" ]; then
            echo "::error::GOOGLE_SERVICE_ACCOUNT_JSON secret not configured."
            exit 1
          fi
          printf '%s' "$SA_B64" | base64 -d > service-account.json
          node -e "const j = JSON.parse(require('fs').readFileSync('service-account.json','utf8')); if (!j.project_id) { console.error('FAIL: project_id missing'); process.exit(1); } console.log('service-account.json valid for', j.project_id);"

      - name: Mint E2E auth token
        run: npm run e2e:token

      - name: Run CI smoke suite
        run: node e2e/ci-smoke.e2e.js

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: .playwright-results/ci-smoke/
          retention-days: 7

      - name: Clean up service-account
        if: always()
        run: rm -f service-account.json
