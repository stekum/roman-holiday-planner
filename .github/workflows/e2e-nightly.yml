name: E2E Smoke (nightly)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Write service-account.json from split secrets
        env:
          SA_PROJECT_ID: ${{ secrets.FIREBASE_SA_PROJECT_ID }}
          SA_CLIENT_EMAIL: ${{ secrets.FIREBASE_SA_CLIENT_EMAIL }}
          SA_PRIVATE_KEY: ${{ secrets.FIREBASE_SA_PRIVATE_KEY }}
        run: |
          for var in SA_PROJECT_ID SA_CLIENT_EMAIL SA_PRIVATE_KEY; do
            if [ -z "${!var:-}" ]; then
              echo "::error::$var secret not configured."
              exit 1
            fi
          done
          node -e "
            const fs = require('fs');
            const sa = {
              type: 'service_account',
              project_id: process.env.SA_PROJECT_ID,
              private_key: process.env.SA_PRIVATE_KEY,
              client_email: process.env.SA_CLIENT_EMAIL,
              token_uri: 'https://oauth2.googleapis.com/token',
            };
            fs.writeFileSync('service-account.json', JSON.stringify(sa));
            console.log('service-account.json built for', sa.project_id);
          "

      - name: Mint E2E auth token
        run: npm run e2e:token

      - name: Run CI smoke suite
        run: node e2e/ci-smoke.e2e.js

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: .playwright-results/ci-smoke/
          retention-days: 7

      - name: Clean up service-account
        if: always()
        run: rm -f service-account.json
