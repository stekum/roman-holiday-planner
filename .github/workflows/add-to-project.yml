name: Auto-add issues and PRs to project

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-to-project:
    name: Add to Roman Holiday Planner project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/stekum/projects/1
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
