name: Deploy Beta

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one beta-deploy at a time; a newer push replaces an in-flight deploy
concurrency:
  group: deploy-beta
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Build + Publish to gh-pages/beta
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Write .env.local from secrets
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_WORKSPACE_ID: ${{ secrets.VITE_FIREBASE_WORKSPACE_ID }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
        run: |
          for var in VITE_FIREBASE_API_KEY VITE_FIREBASE_AUTH_DOMAIN \
                     VITE_FIREBASE_PROJECT_ID VITE_FIREBASE_STORAGE_BUCKET \
                     VITE_FIREBASE_MESSAGING_SENDER_ID VITE_FIREBASE_APP_ID \
                     VITE_FIREBASE_WORKSPACE_ID VITE_GEMINI_API_KEY \
                     VITE_GOOGLE_MAPS_API_KEY; do
            printf '%s=%s\n' "$var" "${!var}" >> .env.local
          done

      - name: Build (beta base path)
        run: npm run build:beta

      - name: Publish to gh-pages /beta
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          destination_dir: beta
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: beta from ${{ github.sha }}'
