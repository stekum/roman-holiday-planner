name: Mark project item as Done when issue is closed

on:
  issues:
    types: [closed]

jobs:
  update-project-status:
    name: Set project item status to Done
    runs-on: ubuntu-latest
    steps:
      - name: Get project item ID for this issue
        id: get-item
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
        run: |
          item_id=$(gh api graphql -f query='
            query($issueId: ID!) {
              node(id: $issueId) {
                ... on Issue {
                  projectItems(first: 10) {
                    nodes {
                      id
                      project { id }
                    }
                  }
                }
              }
            }' \
            -f issueId="$ISSUE_NODE_ID" \
            --jq '.data.node.projectItems.nodes[] | select(.project.id == "PVT_kwHOALePRc4BUPjL") | .id')
          echo "item_id=$item_id" >> "$GITHUB_OUTPUT"

      - name: Set status to Done
        if: steps.get-item.outputs.item_id != ''
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
          ITEM_ID: ${{ steps.get-item.outputs.item_id }}
        run: |
          gh api graphql -f query='
            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { singleSelectOptionId: $optionId }
              }) {
                projectV2Item { id }
              }
            }' \
          -f projectId="PVT_kwHOALePRc4BUPjL" \
          -f itemId="$ITEM_ID" \
          -f fieldId="PVTSSF_lAHOALePRc4BUPjLzhBZEAU" \
          -f optionId="98236657"
